<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="5" fill="#FAFAF9"/>
  <!-- I-beam cursor: vertical stroke with serifs -->
  <!-- Top serif -->
  <line x1="11" y1="8" x2="21" y2="8" stroke="#2C2C2C" stroke-width="2" stroke-linecap="round"/>
  <!-- Bottom serif -->
  <line x1="11" y1="24" x2="21" y2="24" stroke="#2C2C2C" stroke-width="2" stroke-linecap="round"/>
  <!-- Vertical stroke -->
  <line x1="16" y1="8" x2="16" y2="24" stroke="#2C2C2C" stroke-width="2" stroke-linecap="round"/>
</svg>
